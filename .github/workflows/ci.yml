name: ENKI PySpark CI

on:
  push:
    branches: [ main, develop ]

  pull_request:
    branches: [ main, develop ]

jobs:

  code-quality:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Black
      run: |
        black --check src/

    - name: Run isort
      run: |
        isort --check-only src/

    - name: Run Flake8
      run: |
        flake8 src/

    - name: Run Bandit
      run: |
        bandit -r src/